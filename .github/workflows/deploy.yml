name: Deploy para produção

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, wenox-vps]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copiar dist e atualizar serviço Docker
        run: |
          sudo cp -r dist/. /etc/easypanel/projects/wenox/pwa/code/dist/
          sudo docker build -t wenox_pwa /etc/easypanel/projects/wenox/pwa/code/ -q
          sudo docker service update --force wenox_pwa
