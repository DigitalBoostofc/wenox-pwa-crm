name: Deploy para produção

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copiar dist para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: dist/
          target: /tmp/wenox_update
          strip_components: 1

      - name: Rebuild e atualizar serviço Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo cp -r /tmp/wenox_update/. /etc/easypanel/projects/wenox/pwa/code/dist/
            sudo docker build -t wenox_pwa /etc/easypanel/projects/wenox/pwa/code/ -q
            sudo docker service update --force wenox_pwa
